  <!-- Inner hexagon (dark, subtle) -->
  <path d="M20 8L31.32 14.5V27.5L20 34L8.68 27.5V14.5L20 8Z" fill="#1a1f2e" stroke="#2a5070" stroke-width="0.8"/>
