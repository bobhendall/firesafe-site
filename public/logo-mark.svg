  <circle cx="31.32" cy="14.5" r="1.5" fill="#3a8bbd"/>
  <circle cx="31.32" cy="27.5" r="1.5" fill="#3a8bbd"/>
  <circle cx="20" cy="34" r="1.5" fill="#3a8bbd"/>
  <circle cx="8.68" cy="27.5" r="1.5" fill="#3a8bbd"/>
  <circle cx="8.68" cy="14.5" r="1.5" fill="#3a8bbd"/>
